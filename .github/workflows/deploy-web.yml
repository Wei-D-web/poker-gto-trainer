name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build web (SPA)
        run: npx vite build --config vite.config.web.mts
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITESUPABASEURL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITESUPABASEANONKEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITESTRIPEPUBLISHABLEKEY }}
          VITE_STRIPE_PRICE_PRO_MONTHLY: ${{ secrets.VITESTRIPEPRICEPROMONTHLY }}
          VITE_STRIPE_PRICE_LIFETIME: ${{ secrets.VITESTRIPEPRICELIFETIME }}
          VITE_STRIPE_LINK_PRO_MONTHLY: ${{ secrets.VITESTRIPELINKPROMONTHLY }}
          VITE_STRIPE_LINK_LIFETIME: ${{ secrets.VITESTRIPELINKLIFETIME }}
      - name: Prepare pages structure
        run: |
          mkdir -p dist/pages/app
          # Move SPA assets to root /assets/
          mv dist/web/assets dist/pages/assets/
          # Move SPA index.html to /app/
          mv dist/web/index.html dist/pages/app/index.html
          # Copy landing page to root
          cp landing-page.html dist/pages/index.html
          # Copy payment QR images (WeChat/Alipay)
          cp -r payment dist/pages/payment 2>/dev/null || echo "payment/ dir not found, skipping"
          # Add .nojekyll
          touch dist/pages/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
