<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PokerGTO Trainer — 专业 GTO 扑克训练平台" />
    <meta name="theme-color" content="#0a3d1a" />
    <title>PokerGTO Trainer</title>
    <link rel="icon" type="image/png" href="/icon.png" />

    <!-- ── Poker Login Modal Styles ── -->
    <style>
      :root {
        --felt-dark: #0a3d1a;
        --felt-mid: #0e5228;
        --felt-light: #156b34;
      }

      #poker-login-overlay {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #0a2a0f 0%, #050f08 40%, #020503 100%);
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #poker-login-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Felt Texture */
      .felt-texture {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        opacity: 0.35;
        background:
          repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px),
          repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px),
          radial-gradient(ellipse at 30% 20%, rgba(20,100,40,0.4) 0%, transparent 60%),
          radial-gradient(ellipse at 70% 80%, rgba(15,80,30,0.3) 0%, transparent 60%);
      }

      /* Floating Card Suits */
      .floating-suits {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .floating-suit {
        position: absolute;
        font-size: 40px;
        opacity: 0;
        animation: floatSuit var(--dur) var(--dly) infinite ease-in-out;
        text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow);
      }

      @keyframes floatSuit {
        0% { transform: translateY(105vh) rotate(0deg) scale(0.3); opacity: 0; }
        10% { opacity: 0.12; }
        85% { opacity: 0.08; }
        100% { transform: translateY(-10vh) rotate(var(--rot)) scale(1); opacity: 0; }
      }

      /* Login Card */
      .login-card {
        position: relative;
        z-index: 1;
        width: 440px;
        max-width: 92vw;
        max-height: 90vh;
        overflow-y: auto;
        background: linear-gradient(145deg, rgba(20,20,40,0.95), rgba(10,10,25,0.98));
        border: 2px solid rgba(255,215,0,0.25);
        border-radius: 20px;
        box-shadow:
          0 0 60px rgba(255,215,0,0.08),
          0 0 120px rgba(0,0,0,0.6),
          inset 0 1px 0 rgba(255,255,255,0.03);
        backdrop-filter: blur(20px);
      }

      .login-card-inner {
        padding: 36px 32px 28px;
      }

      /* Header */
      .login-header {
        text-align: center;
        margin-bottom: 28px;
      }

      .login-logo-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        background: radial-gradient(circle, rgba(255,215,0,0.15), transparent 70%);
        border-radius: 50%;
        font-size: 36px;
        margin-bottom: 12px;
        animation: pulseGlow 2s ease-in-out infinite;
        filter: drop-shadow(0 0 16px rgba(255,215,0,0.4));
      }

      @keyframes pulseGlow {
        0%, 100% { filter: drop-shadow(0 0 12px rgba(255,215,0,0.3)); }
        50% { filter: drop-shadow(0 0 28px rgba(255,215,0,0.7)); }
      }

      .login-header h2 {
        font-size: 22px;
        font-weight: 800;
        margin: 0 0 4px;
        background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.02em;
      }

      .login-header p {
        font-size: 13px;
        color: #707090;
        margin: 0;
      }

      /* Tabs */
      .login-tabs {
        display: flex;
        background: rgba(255,255,255,0.04);
        border-radius: 12px;
        padding: 4px;
        margin-bottom: 24px;
        gap: 4px;
      }

      .login-tab {
        flex: 1;
        text-align: center;
        padding: 10px 8px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        color: #707090;
        border: none;
        background: transparent;
        transition: all 0.25s ease;
        font-family: inherit;
      }

      .login-tab:hover {
        color: #a0a0b0;
        background: rgba(255,255,255,0.04);
      }

      .login-tab.active {
        color: #ffd700;
        background: rgba(255,215,0,0.1);
        box-shadow: 0 0 12px rgba(255,215,0,0.1);
      }

      /* Forms */
      .login-form { display: none; }
      .login-form.active { display: block; }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #9090a0;
        margin-bottom: 6px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .form-input {
        width: 100%;
        padding: 12px 16px;
        background: #0d0d1a;
        border: 1.5px solid #2a2a4a;
        border-radius: 12px;
        color: #f0f0f0;
        font-size: 15px;
        font-family: inherit;
        transition: border-color 0.25s, box-shadow 0.25s;
        outline: none;
        box-sizing: border-box;
      }

      .form-input:focus {
        border-color: rgba(255,215,0,0.5);
        box-shadow: 0 0 0 3px rgba(255,215,0,0.08), 0 0 20px rgba(255,215,0,0.06);
      }

      .form-input::placeholder {
        color: #404060;
      }

      /* Code Input Row */
      .code-input-row {
        display: flex;
        gap: 10px;
      }

      .code-input-row .form-input {
        flex: 1;
      }

      .btn-send-code {
        white-space: nowrap;
        padding: 12px 16px;
        background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,170,0,0.1));
        border: 1.5px solid rgba(255,215,0,0.3);
        border-radius: 12px;
        color: #ffd700;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s;
        font-family: inherit;
      }

      .btn-send-code:hover {
        background: linear-gradient(135deg, rgba(255,215,0,0.25), rgba(255,170,0,0.18));
        border-color: rgba(255,215,0,0.5);
        box-shadow: 0 0 16px rgba(255,215,0,0.15);
      }

      .btn-send-code:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Submit Button */
      .btn-submit {
        width: 100%;
        padding: 14px;
        margin-top: 8px;
        background: linear-gradient(135deg, #ffd700, #ffaa00);
        border: none;
        border-radius: 14px;
        color: #1a1a00;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        letter-spacing: 0.02em;
        transition: all 0.25s;
        box-shadow: 0 4px 20px rgba(255,215,0,0.2);
        position: relative;
        overflow: hidden;
      }

      .btn-submit::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
        transform: translateX(-100%);
        transition: transform 0.6s;
      }

      .btn-submit:hover::before {
        transform: translateX(100%);
      }

      .btn-submit:hover {
        box-shadow: 0 6px 30px rgba(255,215,0,0.35);
        transform: translateY(-1px);
      }

      .btn-submit:active {
        transform: translateY(0);
        box-shadow: 0 2px 12px rgba(255,215,0,0.2);
      }

      .btn-submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* Social Login Grid */
      .social-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .btn-social {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        padding: 14px 18px;
        background: rgba(255,255,255,0.04);
        border: 1.5px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        color: #f0f0f0;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.25s;
      }

      .btn-social:hover {
        background: rgba(255,255,255,0.08);
        border-color: rgba(255,255,255,0.18);
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      }

      .btn-social .social-icon {
        font-size: 22px;
        width: 32px;
        text-align: center;
        flex-shrink: 0;
      }

      .btn-social .social-badge {
        margin-left: auto;
        font-size: 10px;
        padding: 4px 8px;
        border-radius: 6px;
        background: rgba(255,255,255,0.06);
        color: #606080;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      /* Divider */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 20px 0;
        color: #505070;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      }

      /* Messages */
      .form-message {
        font-size: 12px;
        margin-top: 8px;
        padding: 8px 12px;
        border-radius: 8px;
        display: none;
        font-weight: 500;
      }

      .form-message.error {
        display: block;
        background: rgba(255,71,87,0.1);
        border: 1px solid rgba(255,71,87,0.2);
        color: #ff4757;
      }

      .form-message.success {
        display: block;
        background: rgba(46,213,115,0.1);
        border: 1px solid rgba(46,213,115,0.2);
        color: #2ed573;
      }

      /* Skip Button */
      .login-skip {
        display: block;
        width: 100%;
        text-align: center;
        margin-top: 16px;
        padding: 10px;
        background: transparent;
        border: none;
        color: #505070;
        font-size: 13px;
        cursor: pointer;
        font-family: inherit;
        transition: color 0.25s;
      }

      .login-skip:hover {
        color: #9090b0;
      }

      /* Scrollbar */
      .login-card::-webkit-scrollbar { width: 4px; }
      .login-card::-webkit-scrollbar-track { background: transparent; }
      .login-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

      /* Toast */
      .login-toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100000;
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        opacity: 0;
        transition: opacity 0.3s, transform 0.3s;
        pointer-events: none;
        font-family: inherit;
      }

      .login-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(4px);
      }

      .login-toast.error {
        background: rgba(255,71,87,0.15);
        border: 1px solid rgba(255,71,87,0.3);
        color: #ff4757;
        backdrop-filter: blur(12px);
      }

      .login-toast.success {
        background: rgba(46,213,115,0.15);
        border: 1px solid rgba(46,213,115,0.3);
        color: #2ed573;
        backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body>
    <!-- ── Poker Login Overlay ── -->
    <div id="poker-login-overlay">
      <div class="felt-texture"></div>
      <div class="floating-suits" id="floating-suits"></div>

      <div class="login-card">
        <div class="login-card-inner">
          <div class="login-header">
            <div class="login-logo-icon">🃏</div>
            <h2>PokerGTO Trainer</h2>
            <p>登录以同步进度 · 云端训练 · 社区交流</p>
          </div>

          <div class="login-tabs">
            <button class="login-tab active" data-tab="email">📧 邮箱验证码</button>
            <button class="login-tab" data-tab="social">🔗 社交登录</button>
            <button class="login-tab" data-tab="password">🔑 密码登录</button>
          </div>

          <!-- Email Form -->
          <form class="login-form active" id="form-email" autocomplete="off">
            <div class="form-group">
              <label>邮箱地址</label>
              <input type="email" class="form-input" id="email-input" placeholder="your@email.com" autocomplete="email" />
            </div>
            <div class="form-group">
              <label>验证码</label>
              <div class="code-input-row">
                <input type="text" class="form-input" id="code-input" placeholder="输入 6 位验证码" maxlength="6" autocomplete="off" />
                <button type="button" class="btn-send-code" id="btn-send-code">发送验证码</button>
              </div>
            </div>
            <div class="form-message" id="email-message"></div>
            <button type="submit" class="btn-submit">🚀 验证并登录</button>
          </form>

          <!-- Social Form -->
          <form class="login-form" id="form-social" autocomplete="off">
            <p style="font-size:13px;color:#707090;text-align:center;margin-bottom:16px;">
              选择一种方式快速登录（即将接入）
            </p>
            <div class="social-grid">
              <button type="button" class="btn-social" data-provider="wechat">
                <span class="social-icon">💬</span>
                <span>微信登录</span>
                <span class="social-badge">即将上线</span>
              </button>
              <button type="button" class="btn-social" data-provider="google">
                <span class="social-icon">🔵</span>
                <span>Google 登录</span>
                <span class="social-badge">即将上线</span>
              </button>
              <button type="button" class="btn-social" data-provider="apple">
                <span class="social-icon">🍎</span>
                <span>Apple 登录</span>
                <span class="social-badge">即将上线</span>
              </button>
              <button type="button" class="btn-social" data-provider="github">
                <span class="social-icon">🐙</span>
                <span>GitHub 登录</span>
                <span class="social-badge">即将上线</span>
              </button>
            </div>
            <div class="form-message" id="social-message"></div>
          </form>

          <!-- Password Form -->
          <form class="login-form" id="form-password" autocomplete="off">
            <div class="form-group">
              <label>邮箱 / 用户名</label>
              <input type="text" class="form-input" id="pwd-email" placeholder="your@email.com 或用户名" autocomplete="username" />
            </div>
            <div class="form-group">
              <label>密码</label>
              <input type="password" class="form-input" id="pwd-input" placeholder="输入密码" autocomplete="current-password" />
            </div>
            <div class="form-message" id="password-message"></div>
            <button type="submit" class="btn-submit">🔐 登录</button>
          </form>

          <button class="login-skip" id="btn-skip">先跳过，直接体验 →</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="login-toast" id="login-toast"></div>

    <!-- ── App Root ── -->
    <div id="root"></div>

    <script>
      // ── Landing page 定价按钮跳转 → 保存计划选择 → 等 App 加载后跳转到 Account
      (function(){
        var p = new URLSearchParams(window.location.search).get('plan');
        if (p === 'pro' || p === 'lifetime') {
          sessionStorage.setItem('pricingPlan', p);
          var u = new URL(window.location.href);
          u.searchParams.delete('plan');
          window.history.replaceState({}, '', u.toString());
        }
        var plan = sessionStorage.getItem('pricingPlan');
        if (!plan) return;
        var attempts = 0;
        var timer = setInterval(function(){
          attempts++;
          if (document.querySelector('main')) {
            clearInterval(timer);
            sessionStorage.removeItem('pricingPlan');
            window.dispatchEvent(new CustomEvent('navigate', { detail: { route: 'account' } }));
          }
          if (attempts > 60) { clearInterval(timer); sessionStorage.removeItem('pricingPlan'); }
        }, 500);
      })();
    </script>

    <!-- ── Login Logic ── -->
    <script>
    (function() {
      'use strict';

      var STORAGE_KEY = 'pokerGTO_auth';
      var overlay = document.getElementById('poker-login-overlay');
      var toast = document.getElementById('login-toast');
      var countdownTimer = null;

      function showToast(msg, type) {
        toast.textContent = msg;
        toast.className = 'login-toast ' + (type || 'error') + ' show';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(function() {
          toast.classList.remove('show');
        }, 3000);
      }

      function isAuthenticated() {
        try {
          var auth = JSON.parse(localStorage.getItem(STORAGE_KEY));
          return !!(auth && auth.loggedIn && auth.timestamp);
        } catch (e) {
          return false;
        }
      }

      function saveAuth(identity, method) {
        var auth = {
          loggedIn: true,
          method: method || 'email',
          identity: identity || 'user@email.com',
          timestamp: Date.now()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(auth));
      }

      function hideOverlay() {
        overlay.classList.add('hidden');
        setTimeout(function() {
          if (overlay.parentNode) {
            overlay.style.display = 'none';
          }
        }, 600);
      }

      // Skip if already logged in
      if (isAuthenticated()) {
        hideOverlay();
      }

      // ── Floating Suits ──
      (function initSuits() {
        var suits = ['♠', '♥', '♦', '♣'];
        var colors = { '♠': '#ffffff', '♥': '#ff2d55', '♦': '#ff2d55', '♣': '#ffffff' };
        var container = document.getElementById('floating-suits');
        if (!container) return;
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 18; i++) {
          var suit = suits[Math.floor(Math.random() * suits.length)];
          var el = document.createElement('span');
          el.className = 'floating-suit';
          el.textContent = suit;
          el.style.left = Math.random() * 90 + '%';
          el.style.setProperty('--dur', (12 + Math.random() * 18) + 's');
          el.style.setProperty('--dly', (Math.random() * -20) + 's');
          el.style.setProperty('--rot', (Math.random() * 360 - 180) + 'deg');
          el.style.setProperty('--glow', colors[suit]);
          el.style.fontSize = (28 + Math.random() * 44) + 'px';
          frag.appendChild(el);
        }
        container.appendChild(frag);
      })();

      // ── Tab Switching ──
      var tabs = document.querySelectorAll('.login-tab');
      var forms = document.querySelectorAll('.login-form');

      tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
          var target = this.getAttribute('data-tab');
          tabs.forEach(function(t) { t.classList.remove('active'); });
          this.classList.add('active');
          forms.forEach(function(f) {
            f.classList.remove('active');
            if (f.id === 'form-' + target) {
              f.classList.add('active');
            }
          });
          document.querySelectorAll('.form-message').forEach(function(m) {
            m.className = 'form-message';
            m.textContent = '';
          });
        });
      });

      // ── Email Code ──
      var emailInput = document.getElementById('email-input');
      var codeInput = document.getElementById('code-input');
      var btnSendCode = document.getElementById('btn-send-code');
      var emailForm = document.getElementById('form-email');
      var emailMsg = document.getElementById('email-message');

      if (emailInput) {
        setTimeout(function() {
          if (!isAuthenticated()) emailInput.focus();
        }, 400);
      }

      if (btnSendCode) {
        btnSendCode.addEventListener('click', function() {
          var email = emailInput.value.trim();
          if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showToast('请输入有效的邮箱地址', 'error');
            return;
          }
          btnSendCode.disabled = true;
          var seconds = 60;
          btnSendCode.textContent = seconds + 's 后重发';

          if (countdownTimer) clearInterval(countdownTimer);
          countdownTimer = setInterval(function() {
            seconds--;
            if (seconds <= 0) {
              clearInterval(countdownTimer);
              btnSendCode.disabled = false;
              btnSendCode.textContent = '发送验证码';
            } else {
              btnSendCode.textContent = seconds + 's 后重发';
            }
          }, 1000);

          showToast('验证码已发送至 ' + email + '（演示模式：输入 123456）', 'success');
          setTimeout(function() { codeInput.focus(); }, 200);
        });
      }

      if (emailForm) {
        emailForm.addEventListener('submit', function(e) {
          e.preventDefault();
          var email = emailInput.value.trim();
          var code = codeInput.value.trim();

          if (!email) {
            emailMsg.className = 'form-message error';
            emailMsg.textContent = '请输入邮箱地址';
            return;
          }
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            emailMsg.className = 'form-message error';
            emailMsg.textContent = '邮箱格式不正确';
            return;
          }
          if (!code) {
            emailMsg.className = 'form-message error';
            emailMsg.textContent = '请输入验证码';
            return;
          }
          if (code === '123456' || code.length === 6) {
            emailMsg.className = 'form-message success';
            emailMsg.textContent = '✅ 验证成功，正在进入应用...';
            saveAuth(email, 'email');
            setTimeout(function() { hideOverlay(); }, 800);
          } else {
            emailMsg.className = 'form-message error';
            emailMsg.textContent = '验证码错误，演示模式请输入 123456';
          }
        });
      }

      // ── Social ──
      var socialMsg = document.getElementById('social-message');
      document.querySelectorAll('.btn-social').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var name = this.querySelector('span:not(.social-badge)').textContent.trim();
          socialMsg.className = 'form-message error';
          socialMsg.textContent = '⚠️ ' + name + ' 功能正在开发中，请使用邮箱验证码登录';
          showToast(name + ' 即将上线，敬请期待', 'error');
        });
      });

      // ── Password ──
      var pwdForm = document.getElementById('form-password');
      var pwdMsg = document.getElementById('password-message');
      var pwdEmailInput = document.getElementById('pwd-email');
      var pwdInput = document.getElementById('pwd-input');

      if (pwdForm) {
        pwdForm.addEventListener('submit', function(e) {
          e.preventDefault();
          var username = pwdEmailInput.value.trim();
          var password = pwdInput.value.trim();

          if (!username) {
            pwdMsg.className = 'form-message error';
            pwdMsg.textContent = '请输入邮箱或用户名';
            return;
          }
          if (!password || password.length < 4) {
            pwdMsg.className = 'form-message error';
            pwdMsg.textContent = '密码至少 4 位';
            return;
          }
          pwdMsg.className = 'form-message success';
          pwdMsg.textContent = '✅ 登录成功，正在进入应用...';
          saveAuth(username, 'password');
          setTimeout(function() { hideOverlay(); }, 800);
        });
      }

      // ── Skip ──
      var skipBtn = document.getElementById('btn-skip');
      if (skipBtn) {
        skipBtn.addEventListener('click', function() {
          saveAuth('guest', 'skip');
          hideOverlay();
        });
      }
    })();
    </script>

    <script type="module" src="../src/renderer/web-main.tsx"></script>
  </body>
</html>
