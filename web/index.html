<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PokerGTO Trainer — 专业 GTO 扑克训练平台" />
    <meta name="theme-color" content="#0a3d1a" />
    <title>PokerGTO Trainer</title>
    <link rel="icon" type="image/png" href="/icon.png" />

    <style>
      /* ═══════════════════════════════════════════
         POKER LOGIN MODAL — FULL ENHANCED STYLES
         ═══════════════════════════════════════════ */

      :root {
        --felt-dark: #0a3d1a;
        --felt-mid: #0e5228;
        --felt-light: #156b34;
        --gold: #ffd700;
        --gold-dim: #b8960f;
        --neon-red: #ff2d55;
        --neon-blue: #0a84ff;
        --neon-purple: #af52de;
        --neon-cyan: #00d4aa;
      }

      /* ── Overlay ── */
      #poker-login-overlay {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #0a2a0f 0%, #050f08 40%, #020503 100%);
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #poker-login-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* ── Felt + Noise Texture ── */
      .felt-texture {
        position: absolute; inset: 0; pointer-events: none; overflow: hidden; opacity: 0.38;
        background:
          repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px),
          repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px),
          radial-gradient(ellipse at 30% 20%, rgba(20,100,40,0.4) 0%, transparent 60%),
          radial-gradient(ellipse at 70% 80%, rgba(15,80,30,0.3) 0%, transparent 60%);
      }
      .felt-noise {
        position: absolute; inset: 0; pointer-events: none; overflow: hidden; opacity: 0.06;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 200px 200px;
      }

      /* ── Particle Stars ── */
      .particles-layer {
        position: absolute; inset: 0; pointer-events: none; overflow: hidden;
      }
      .particle-star {
        position: absolute;
        width: var(--sz); height: var(--sz);
        background: var(--clr);
        border-radius: 50%;
        opacity: 0;
        animation: twinkle var(--pd) var(--pdly) infinite ease-in-out;
        box-shadow: 0 0 var(--blur) var(--clr);
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.08; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.8); }
      }

      /* ── Floating Elements Container (parallax target) ── */
      .floating-all {
        position: absolute; inset: -10%; pointer-events: none; overflow: hidden;
        transition: transform 0.15s ease-out;
        will-change: transform;
      }
      .floating-suit {
        position: absolute;
        font-size: 40px;
        opacity: 0;
        animation: floatUp var(--dur) var(--dly) infinite ease-in-out;
        text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow);
      }
      @keyframes floatUp {
        0%   { transform: translateY(115vh) rotate(0deg) scale(0.2); opacity: 0; }
        8%   { opacity: 0.14; }
        85%  { opacity: 0.06; }
        100% { transform: translateY(-15vh) rotate(var(--rot)) scale(1.1); opacity: 0; }
      }

      /* ── Floating Chips ── */
      .floating-chip {
        position: absolute;
        width: var(--csz); height: var(--csz);
        border-radius: 50%;
        opacity: 0;
        animation: floatChip var(--cdur) var(--cdly) infinite ease-in-out;
        box-shadow: 0 0 12px var(--cglow), 0 0 24px var(--cglow), inset 0 0 8px rgba(255,255,255,0.15);
        background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.3) 0%, transparent 40%),
                    radial-gradient(circle, var(--cclr) 0%, var(--cdark) 70%);
        border: 3px dashed var(--crim);
      }
      @keyframes floatChip {
        0%   { transform: translateY(115vh) rotate(0deg) scale(0.3); opacity: 0; }
        10%  { opacity: 0.09; }
        80%  { opacity: 0.05; }
        100% { transform: translateY(-15vh) rotate(var(--crot)) scale(0.9); opacity: 0; }
      }

      /* ── Floating Card Backs ── */
      .floating-cardback {
        position: absolute;
        width: var(--bw); height: var(--bh);
        border-radius: 6px;
        opacity: 0;
        animation: floatCardBack var(--bdur) var(--bdly) infinite ease-in-out;
        background: linear-gradient(135deg, #1a3a6b, #0d1f3c);
        border: 2px solid rgba(255,255,255,0.15);
        box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      }
      .floating-cardback::after {
        content: '';
        position: absolute; inset: 4px;
        border-radius: 3px;
        border: 1.5px solid rgba(255,255,255,0.12);
        background: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,255,255,0.03) 3px, rgba(255,255,255,0.03) 6px);
      }
      @keyframes floatCardBack {
        0%   { transform: translateY(115vh) rotate(0deg) scale(0.3); opacity: 0; }
        8%   { opacity: 0.1; }
        82%  { opacity: 0.05; }
        100% { transform: translateY(-15vh) rotate(var(--brot)) scale(1); opacity: 0; }
      }

      /* ── Spotlight ── */
      .spotlight {
        position: absolute; top: -60%; left: 50%;
        transform: translateX(-50%);
        width: 600px; height: 600px;
        background: radial-gradient(ellipse, rgba(255,215,0,0.06) 0%, transparent 70%);
        pointer-events: none; z-index: 0;
        animation: spotlightDrift 6s ease-in-out infinite;
      }
      @keyframes spotlightDrift {
        0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.6; }
        50% { transform: translateX(-50%) translateY(30px); opacity: 1; }
      }

      /* ── Login Card — Deal Animation ── */
      .login-card {
        position: relative;
        z-index: 1;
        width: 460px;
        max-width: 93vw;
        max-height: 90vh;
        overflow-y: auto;
        background: linear-gradient(145deg, rgba(20,20,40,0.96), rgba(10,10,25,0.985));
        border: 2px solid rgba(255,215,0,0.3);
        border-radius: 20px;
        box-shadow:
          0 0 60px rgba(255,215,0,0.1),
          0 0 140px rgba(0,0,0,0.7),
          inset 0 1px 0 rgba(255,255,255,0.04);
        backdrop-filter: blur(20px);
        animation: dealCard 0.7s cubic-bezier(.16,1,.3,1) forwards;
        animation-play-state: running;
      }
      @keyframes dealCard {
        0%   { transform: translateY(100vh) rotate(-12deg) scale(0.6); opacity: 0; }
        60%  { transform: translateY(-10px) rotate(1deg) scale(1.01); opacity: 1; }
        100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      }

      /* ── Border Breathing Glow ── */
      .login-card::before {
        content: '';
        position: absolute; inset: -2px; z-index: -1;
        border-radius: 22px;
        background: transparent;
        pointer-events: none;
        animation: breatheBorder 3s ease-in-out infinite;
      }
      @keyframes breatheBorder {
        0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.15), 0 0 50px rgba(255,215,0,0.05); }
        50%      { box-shadow: 0 0 35px rgba(255,215,0,0.35), 0 0 80px rgba(255,215,0,0.15), 0 0 120px rgba(255,170,0,0.08); }
      }

      /* ── Corner Suit Decorations ── */
      .corner-suits { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
      .corner-suit {
        position: absolute;
        font-size: 52px;
        opacity: 0.06;
        text-shadow: 0 0 30px currentColor;
      }
      .corner-suit.tl { top: 12px; left: 16px; color: var(--neon-red); }
      .corner-suit.tr { top: 12px; right: 16px; color: var(--neon-blue); }
      .corner-suit.bl { bottom: 12px; left: 16px; color: var(--neon-purple); }
      .corner-suit.br { bottom: 12px; right: 16px; color: var(--neon-cyan); }

      /* ── Chip Strip Decoration ── */
      .chip-strip {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-bottom: 20px;
        position: relative;
        z-index: 1;
      }
      .chip-strip .mini-chip {
        width: 12px; height: 12px;
        border-radius: 50%;
        border: 2px solid;
        box-shadow: 0 0 6px var(--cs-glow);
      }

      .login-card-inner {
        padding: 32px 32px 24px;
        position: relative;
        z-index: 1;
      }

      /* ── Rotating Card Logo ── */
      .logo-card-3d {
        width: 56px; height: 76px;
        margin: 0 auto 14px;
        perspective: 400px;
        cursor: default;
        position: relative;
        z-index: 1;
      }
      .logo-card-inner {
        position: relative;
        width: 100%; height: 100%;
        transform-style: preserve-3d;
        animation: rotateCardLogo 6s ease-in-out infinite;
      }
      @keyframes rotateCardLogo {
        0%   { transform: rotateY(0deg); }
        40%  { transform: rotateY(0deg); }
        50%  { transform: rotateY(180deg); }
        90%  { transform: rotateY(180deg); }
        100% { transform: rotateY(360deg); }
      }
      .logo-card-face {
        position: absolute;
        inset: 0;
        border-radius: 8px;
        backface-visibility: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      }
      .logo-card-front {
        background: linear-gradient(135deg, #fff, #f0f0f0);
        border: 2px solid #ddd;
      }
      .logo-card-back {
        background: linear-gradient(135deg, #c41e3a, #8b0000);
        border: 2px solid #ff6b6b;
        transform: rotateY(180deg);
        background-image:
          repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,255,255,0.05) 3px, rgba(255,255,255,0.05) 6px);
      }
      .logo-card-back::after {
        content: '🃏';
        font-size: 24px;
      }

      /* Header */
      .login-header {
        text-align: center;
        margin-bottom: 24px;
        position: relative;
        z-index: 1;
      }
      .login-header h2 {
        font-size: 22px; font-weight: 800;
        margin: 0 0 4px;
        background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.02em;
      }
      .login-header p {
        font-size: 13px; color: #707090; margin: 0;
      }

      /* ── Tabs with transition ── */
      .login-tabs {
        display: flex;
        background: rgba(255,255,255,0.04);
        border-radius: 12px;
        padding: 4px;
        margin-bottom: 24px;
        gap: 4px;
        position: relative; z-index: 1;
      }
      .login-tab {
        flex: 1; text-align: center;
        padding: 10px 8px; border-radius: 10px;
        font-size: 13px; font-weight: 600;
        cursor: pointer; color: #707090;
        border: none; background: transparent;
        transition: all 0.3s cubic-bezier(.16,1,.3,1);
        font-family: inherit;
        position: relative;
      }
      .login-tab:hover { color: #a0a0b0; background: rgba(255,255,255,0.04); }
      .login-tab.active {
        color: #ffd700;
        background: rgba(255,215,0,0.1);
        box-shadow: 0 0 16px rgba(255,215,0,0.1);
      }

      /* ── Forms with slide-fade transition ── */
      .login-form {
        position: absolute; top: 0; left: 0;
        width: 100%;
        visibility: hidden;
        opacity: 0;
        transform: translateX(20px);
        transition: opacity 0.25s ease, transform 0.25s cubic-bezier(.16,1,.3,1), visibility 0s 0.25s;
        padding: 0 4px;
        box-sizing: border-box;
      }
      .login-form.active {
        position: relative;
        visibility: visible;
        opacity: 1;
        transform: translateX(0);
        transition: opacity 0.25s ease, transform 0.25s cubic-bezier(.16,1,.3,1), visibility 0s 0s;
      }

      .forms-wrapper {
        position: relative;
      }

      .form-group { margin-bottom: 16px; }
      .form-group label {
        display: block;
        font-size: 11px; font-weight: 700;
        color: #9090a0;
        margin-bottom: 6px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .form-input {
        width: 100%;
        padding: 13px 16px;
        background: #0d0d1a;
        border: 1.5px solid #2a2a4a;
        border-radius: 12px;
        color: #f0f0f0;
        font-size: 15px; font-family: inherit;
        transition: border-color 0.25s, box-shadow 0.25s;
        outline: none; box-sizing: border-box;
      }
      .form-input:focus {
        border-color: rgba(255,215,0,0.5);
        box-shadow: 0 0 0 3px rgba(255,215,0,0.08), 0 0 20px rgba(255,215,0,0.06);
      }
      .form-input::placeholder { color: #404060; }

      /* Code row */
      .code-input-row { display: flex; gap: 10px; }
      .code-input-row .form-input { flex: 1; }
      .btn-send-code {
        white-space: nowrap;
        padding: 12px 16px;
        background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,170,0,0.1));
        border: 1.5px solid rgba(255,215,0,0.3);
        border-radius: 12px;
        color: #ffd700;
        font-size: 13px; font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        font-family: inherit;
      }
      .btn-send-code:hover {
        background: linear-gradient(135deg, rgba(255,215,0,0.25), rgba(255,170,0,0.18));
        border-color: rgba(255,215,0,0.5);
        box-shadow: 0 0 20px rgba(255,215,0,0.2);
        transform: translateY(-1px);
      }
      .btn-send-code:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

      /* Submit Button with ripple */
      .btn-submit {
        width: 100%;
        padding: 14px;
        margin-top: 8px;
        background: linear-gradient(135deg, #ffd700, #ffaa00);
        border: none;
        border-radius: 14px;
        color: #1a1a00;
        font-size: 16px; font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        letter-spacing: 0.02em;
        transition: all 0.3s cubic-bezier(.16,1,.3,1);
        box-shadow: 0 4px 24px rgba(255,215,0,0.25);
        position: relative; overflow: hidden;
      }
      .btn-submit::before {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(135deg, transparent 35%, rgba(255,255,255,0.25) 50%, transparent 65%);
        transform: translateX(-100%);
        transition: transform 0.7s;
      }
      .btn-submit:hover::before { transform: translateX(100%); }
      .btn-submit:hover {
        box-shadow: 0 6px 36px rgba(255,215,0,0.45);
        transform: translateY(-2px);
      }
      .btn-submit:active {
        transform: translateY(0) scale(0.98);
        box-shadow: 0 2px 12px rgba(255,215,0,0.2);
        transition: all 0.1s;
      }
      .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

      /* ── Ripple Effect ── */
      .ripple-ring {
        position: absolute;
        border-radius: 50%;
        border: 2px solid rgba(255,215,0,0.6);
        animation: rippleOut 0.8s ease-out forwards;
        pointer-events: none;
      }
      @keyframes rippleOut {
        0%   { width: 0; height: 0; opacity: 1; }
        100% { width: 300px; height: 300px; opacity: 0; margin-left: -150px; margin-top: -150px; }
      }

      /* Social Grid */
      .social-grid { display: flex; flex-direction: column; gap: 10px; }
      .btn-social {
        display: flex; align-items: center; gap: 12px;
        width: 100%;
        padding: 14px 18px;
        background: rgba(255,255,255,0.03);
        border: 1.5px solid rgba(255,255,255,0.07);
        border-radius: 14px;
        color: #f0f0f0;
        font-size: 15px; font-weight: 500;
        cursor: pointer; font-family: inherit;
        transition: all 0.3s cubic-bezier(.16,1,.3,1);
      }
      .btn-social:hover {
        background: rgba(255,255,255,0.08);
        border-color: rgba(255,255,255,0.18);
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(0,0,0,0.4);
      }
      .btn-social .social-icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
      .btn-social .social-badge {
        margin-left: auto;
        font-size: 10px; padding: 4px 8px; border-radius: 6px;
        background: rgba(255,255,255,0.06);
        color: #606080; font-weight: 600; letter-spacing: 0.04em;
      }

      /* Divider */
      .divider {
        display: flex; align-items: center; gap: 12px;
        margin: 18px 0;
        color: #505070;
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.06em; text-transform: uppercase;
      }
      .divider::before, .divider::after {
        content: ''; flex: 1; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      }

      /* Messages */
      .form-message {
        font-size: 12px; margin-top: 8px; padding: 8px 12px;
        border-radius: 8px; display: none; font-weight: 500;
      }
      .form-message.error {
        display: block;
        background: rgba(255,71,87,0.1);
        border: 1px solid rgba(255,71,87,0.2);
        color: #ff4757;
      }
      .form-message.success {
        display: block;
        background: rgba(46,213,115,0.1);
        border: 1px solid rgba(46,213,115,0.2);
        color: #2ed573;
      }

      /* Skip Button */
      .login-skip {
        display: block; width: 100%; text-align: center;
        margin-top: 16px; padding: 10px;
        background: transparent; border: none;
        color: #505070; font-size: 13px;
        cursor: pointer; font-family: inherit;
        transition: all 0.3s;
        position: relative; z-index: 1;
      }
      .login-skip:hover { color: #a0a0c0; letter-spacing: 0.03em; }

      /* Scrollbar */
      .login-card::-webkit-scrollbar { width: 4px; }
      .login-card::-webkit-scrollbar-track { background: transparent; }
      .login-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

      /* Toast */
      .login-toast {
        position: fixed; top: 20px; left: 50%;
        transform: translateX(-50%);
        z-index: 100000;
        padding: 12px 24px; border-radius: 12px;
        font-size: 14px; font-weight: 600;
        opacity: 0;
        transition: opacity 0.3s, transform 0.3s;
        pointer-events: none; font-family: inherit;
      }
      .login-toast.show { opacity: 1; transform: translateX(-50%) translateY(4px); }
      .login-toast.error {
        background: rgba(255,71,87,0.15);
        border: 1px solid rgba(255,71,87,0.3);
        color: #ff4757;
        backdrop-filter: blur(12px);
      }
      .login-toast.success {
        background: rgba(46,213,115,0.15);
        border: 1px solid rgba(46,213,115,0.3);
        color: #2ed573;
        backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body>
    <!-- ═══════════════════════════════════════════
         POKER LOGIN OVERLAY
         ═══════════════════════════════════════════ -->
    <div id="poker-login-overlay">
      <!-- Felt textures -->
      <div class="felt-texture"></div>
      <div class="felt-noise"></div>

      <!-- Particle stars -->
      <div class="particles-layer" id="particles-layer"></div>

      <!-- Spotlight -->
      <div class="spotlight"></div>

      <!-- Floating elements with parallax -->
      <div class="floating-all" id="floating-all">
        <div id="floating-suits"></div>
        <div id="floating-chips"></div>
        <div id="floating-cardbacks"></div>
      </div>

      <!-- Login Card -->
      <div class="login-card" id="login-card">
        <!-- Corner suit decorations -->
        <div class="corner-suits">
          <span class="corner-suit tl">♥</span>
          <span class="corner-suit tr">♦</span>
          <span class="corner-suit bl">♣</span>
          <span class="corner-suit br">♠</span>
        </div>

        <div class="login-card-inner">
          <!-- Chip strip decoration -->
          <div class="chip-strip">
            <span class="mini-chip" style="border-color:#ff2d55;--cs-glow:rgba(255,45,85,0.5);background:rgba(255,45,85,0.2);"></span>
            <span class="mini-chip" style="border-color:#0a84ff;--cs-glow:rgba(10,132,255,0.5);background:rgba(10,132,255,0.2);"></span>
            <span class="mini-chip" style="border-color:#ffd700;--cs-glow:rgba(255,215,0,0.5);background:rgba(255,215,0,0.2);"></span>
            <span class="mini-chip" style="border-color:#af52de;--cs-glow:rgba(175,82,222,0.5);background:rgba(175,82,222,0.2);"></span>
            <span class="mini-chip" style="border-color:#00d4aa;--cs-glow:rgba(0,212,170,0.5);background:rgba(0,212,170,0.2);"></span>
          </div>

          <!-- 3D Rotating Card Logo -->
          <div class="logo-card-3d">
            <div class="logo-card-inner">
              <div class="logo-card-face logo-card-front">🂡</div>
              <div class="logo-card-face logo-card-back"></div>
            </div>
          </div>

          <div class="login-header">
            <h2>PokerGTO Trainer</h2>
            <p>登录以同步进度 · 云端训练 · 社区交流</p>
          </div>

          <!-- Tabs -->
          <div class="login-tabs">
            <button class="login-tab active" data-tab="email">📧 邮箱验证码</button>
            <button class="login-tab" data-tab="social">🔗 社交登录</button>
            <button class="login-tab" data-tab="password">🔑 密码登录</button>
          </div>

          <!-- Forms container -->
          <div class="forms-wrapper">
            <!-- Email Form -->
            <form class="login-form active" id="form-email" autocomplete="off">
              <div class="form-group">
                <label>邮箱地址</label>
                <input type="email" class="form-input" id="email-input" placeholder="your@email.com" autocomplete="email" />
              </div>
              <div class="form-group">
                <label>验证码</label>
                <div class="code-input-row">
                  <input type="text" class="form-input" id="code-input" placeholder="输入 6 位验证码" maxlength="6" autocomplete="off" />
                  <button type="button" class="btn-send-code" id="btn-send-code">发送验证码</button>
                </div>
              </div>
              <div class="form-message" id="email-message"></div>
              <button type="submit" class="btn-submit">🚀 验证并登录</button>
            </form>

            <!-- Social Form -->
            <form class="login-form" id="form-social" autocomplete="off">
              <p style="font-size:13px;color:#707090;text-align:center;margin-bottom:14px;">
                选择一种方式快速登录（即将接入）
              </p>
              <div class="social-grid">
                <button type="button" class="btn-social" data-provider="wechat">
                  <span class="social-icon">💬</span><span>微信登录</span><span class="social-badge">即将上线</span>
                </button>
                <button type="button" class="btn-social" data-provider="google">
                  <span class="social-icon">🔵</span><span>Google 登录</span><span class="social-badge">即将上线</span>
                </button>
                <button type="button" class="btn-social" data-provider="apple">
                  <span class="social-icon">🍎</span><span>Apple 登录</span><span class="social-badge">即将上线</span>
                </button>
                <button type="button" class="btn-social" data-provider="github">
                  <span class="social-icon">🐙</span><span>GitHub 登录</span><span class="social-badge">即将上线</span>
                </button>
              </div>
              <div class="form-message" id="social-message"></div>
            </form>

            <!-- Password Form -->
            <form class="login-form" id="form-password" autocomplete="off">
              <div class="form-group">
                <label>邮箱 / 用户名</label>
                <input type="text" class="form-input" id="pwd-email" placeholder="your@email.com 或用户名" autocomplete="username" />
              </div>
              <div class="form-group">
                <label>密码</label>
                <input type="password" class="form-input" id="pwd-input" placeholder="输入密码" autocomplete="current-password" />
              </div>
              <div class="form-message" id="password-message"></div>
              <button type="submit" class="btn-submit">🔐 登录</button>
            </form>
          </div>

          <button class="login-skip" id="btn-skip">先跳过，直接体验 →</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="login-toast" id="login-toast"></div>

    <!-- ── App Root ── -->
    <div id="root"></div>

    <script>
      // ── Landing page 定价按钮跳转
      (function(){
        var p = new URLSearchParams(window.location.search).get('plan');
        if (p === 'pro' || p === 'lifetime') {
          sessionStorage.setItem('pricingPlan', p);
          var u = new URL(window.location.href);
          u.searchParams.delete('plan');
          window.history.replaceState({}, '', u.toString());
        }
        var plan = sessionStorage.getItem('pricingPlan');
        if (!plan) return;
        var attempts = 0;
        var timer = setInterval(function(){
          attempts++;
          if (document.querySelector('main')) {
            clearInterval(timer);
            sessionStorage.removeItem('pricingPlan');
            window.dispatchEvent(new CustomEvent('navigate', { detail: { route: 'account' } }));
          }
          if (attempts > 60) { clearInterval(timer); sessionStorage.removeItem('pricingPlan'); }
        }, 500);
      })();
    </script>

    <!-- ── Login Logic ── -->
    <script>
    (function() {
      'use strict';

      var STORAGE_KEY = 'pokerGTO_auth';
      var overlay = document.getElementById('poker-login-overlay');
      var toast = document.getElementById('login-toast');
      var countdownTimer = null;

      function showToast(msg, type) {
        toast.textContent = msg;
        toast.className = 'login-toast ' + (type || 'error') + ' show';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(function() { toast.classList.remove('show'); }, 3000);
      }

      function isAuthenticated() {
        try {
          var auth = JSON.parse(localStorage.getItem(STORAGE_KEY));
          return !!(auth && auth.loggedIn && auth.timestamp);
        } catch (e) { return false; }
      }

      function saveAuth(identity, method) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          loggedIn: true, method: method || 'email',
          identity: identity || 'user@email.com', timestamp: Date.now()
        }));
      }

      function hideOverlay() {
        overlay.classList.add('hidden');
        setTimeout(function() {
          if (overlay.parentNode) overlay.style.display = 'none';
        }, 600);
      }

      // Already logged in → skip
      if (isAuthenticated()) { hideOverlay(); }

      // ═════════════════════════════════════
      //  MOUSE PARALLAX
      // ═════════════════════════════════════
      (function initParallax() {
        var floatingAll = document.getElementById('floating-all');
        if (!floatingAll) return;
        document.addEventListener('mousemove', function(e) {
          var x = (e.clientX / window.innerWidth - 0.5) * 14;
          var y = (e.clientY / window.innerHeight - 0.5) * 14;
          floatingAll.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
        });
      })();

      // ═════════════════════════════════════
      //  PARTICLE STARS
      // ═════════════════════════════════════
      (function initParticles() {
        var layer = document.getElementById('particles-layer');
        if (!layer) return;
        var colors = ['#ffd700','#ffaa55','#ffffff','#ff6b6b','#6bc5ff','#c084fc','#4ade80'];
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 40; i++) {
          var star = document.createElement('span');
          star.className = 'particle-star';
          var clr = colors[Math.floor(Math.random() * colors.length)];
          star.style.cssText = [
            'left:' + Math.random() * 95 + '%',
            'top:' + Math.random() * 95 + '%',
            '--sz:' + (1.5 + Math.random() * 3) + 'px',
            '--clr:' + clr,
            '--blur:' + (3 + Math.random() * 6) + 'px',
            '--pd:' + (2 + Math.random() * 4) + 's',
            '--pdly:' + (Math.random() * -5) + 's'
          ].join(';');
          frag.appendChild(star);
        }
        layer.appendChild(frag);
      })();

      // ═════════════════════════════════════
      //  FLOATING SUITS
      // ═════════════════════════════════════
      (function initSuits() {
        var suits = ['♠','♥','♦','♣'];
        var colors = { '♠':'#ffffff','♥':'#ff2d55','♦':'#ff2d55','♣':'#ffffff' };
        var container = document.getElementById('floating-suits');
        if (!container) return;
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 18; i++) {
          var suit = suits[Math.floor(Math.random() * suits.length)];
          var el = document.createElement('span');
          el.className = 'floating-suit';
          el.textContent = suit;
          el.style.left = Math.random() * 90 + '%';
          el.style.setProperty('--dur', (14 + Math.random() * 20) + 's');
          el.style.setProperty('--dly', (Math.random() * -22) + 's');
          el.style.setProperty('--rot', (Math.random() * 360 - 180) + 'deg');
          el.style.setProperty('--glow', colors[suit]);
          el.style.fontSize = (28 + Math.random() * 48) + 'px';
          frag.appendChild(el);
        }
        container.appendChild(frag);
      })();

      // ═════════════════════════════════════
      //  FLOATING CHIPS
      // ═════════════════════════════════════
      (function initChips() {
        var chips = [
          { clr:'#ff2d55', dark:'#8b0020', rim:'rgba(255,45,85,0.4)', glow:'rgba(255,45,85,0.4)' },
          { clr:'#0a84ff', dark:'#003380', rim:'rgba(10,132,255,0.4)', glow:'rgba(10,132,255,0.4)' },
          { clr:'#ffd700', dark:'#8b6c00', rim:'rgba(255,215,0,0.4)', glow:'rgba(255,215,0,0.4)' },
          { clr:'#af52de', dark:'#4a0080', rim:'rgba(175,82,222,0.4)', glow:'rgba(175,82,222,0.4)' },
          { clr:'#00d4aa', dark:'#005040', rim:'rgba(0,212,170,0.4)', glow:'rgba(0,212,170,0.4)' },
        ];
        var container = document.getElementById('floating-chips');
        if (!container) return;
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 10; i++) {
          var c = chips[Math.floor(Math.random() * chips.length)];
          var size = 30 + Math.random() * 35;
          var el = document.createElement('span');
          el.className = 'floating-chip';
          el.style.left = Math.random() * 88 + '%';
          el.style.setProperty('--csz', size + 'px');
          el.style.setProperty('--cclr', c.clr);
          el.style.setProperty('--cdark', c.dark);
          el.style.setProperty('--crim', c.rim);
          el.style.setProperty('--cglow', c.glow);
          el.style.setProperty('--cdur', (16 + Math.random() * 22) + 's');
          el.style.setProperty('--cdly', (Math.random() * -25) + 's');
          el.style.setProperty('--crot', (Math.random() * 720 - 360) + 'deg');
          frag.appendChild(el);
        }
        container.appendChild(frag);
      })();

      // ═════════════════════════════════════
      //  FLOATING CARD BACKS
      // ═════════════════════════════════════
      (function initCardBacks() {
        var container = document.getElementById('floating-cardbacks');
        if (!container) return;
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 6; i++) {
          var w = 36 + Math.random() * 24;
          var h = w * 1.4;
          var el = document.createElement('span');
          el.className = 'floating-cardback';
          el.style.left = Math.random() * 85 + '%';
          el.style.setProperty('--bw', w + 'px');
          el.style.setProperty('--bh', h + 'px');
          el.style.setProperty('--bdur', (18 + Math.random() * 24) + 's');
          el.style.setProperty('--bdly', (Math.random() * -28) + 's');
          el.style.setProperty('--brot', (Math.random() * 540 - 270) + 'deg');
          frag.appendChild(el);
        }
        container.appendChild(frag);
      })();

      // ═════════════════════════════════════
      //  RIPPLE EFFECT on submit buttons
      // ═════════════════════════════════════
      (function initRipples() {
        document.querySelectorAll('.btn-submit').forEach(function(btn) {
          btn.addEventListener('click', function(e) {
            var ring = document.createElement('span');
            ring.className = 'ripple-ring';
            ring.style.left = (e.offsetX || e.clientX - btn.getBoundingClientRect().left) + 'px';
            ring.style.top = (e.offsetY || e.clientY - btn.getBoundingClientRect().top) + 'px';
            btn.appendChild(ring);
            setTimeout(function() { if (ring.parentNode) ring.parentNode.removeChild(ring); }, 800);
          });
        });
      })();

      // ═════════════════════════════════════
      //  TAB SWITCHING with transition
      // ═════════════════════════════════════
      var tabs = document.querySelectorAll('.login-tab');
      var forms = document.querySelectorAll('.login-form');

      tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
          var target = this.getAttribute('data-tab');
          tabs.forEach(function(t) { t.classList.remove('active'); });
          this.classList.add('active');
          forms.forEach(function(f) {
            f.classList.remove('active');
            if (f.id === 'form-' + target) f.classList.add('active');
          });
          document.querySelectorAll('.form-message').forEach(function(m) {
            m.className = 'form-message'; m.textContent = '';
          });
        });
      });

      // ═════════════════════════════════════
      //  EMAIL CODE LOGIN
      // ═════════════════════════════════════
      var emailInput = document.getElementById('email-input');
      var codeInput = document.getElementById('code-input');
      var btnSendCode = document.getElementById('btn-send-code');
      var emailForm = document.getElementById('form-email');
      var emailMsg = document.getElementById('email-message');

      if (emailInput) {
        setTimeout(function() { if (!isAuthenticated()) emailInput.focus(); }, 600);
      }

      if (btnSendCode) {
        btnSendCode.addEventListener('click', function() {
          var email = emailInput.value.trim();
          if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showToast('请输入有效的邮箱地址', 'error'); return;
          }
          btnSendCode.disabled = true;
          var seconds = 60;
          btnSendCode.textContent = seconds + 's 后重发';
          if (countdownTimer) clearInterval(countdownTimer);
          countdownTimer = setInterval(function() {
            seconds--;
            if (seconds <= 0) {
              clearInterval(countdownTimer);
              btnSendCode.disabled = false;
              btnSendCode.textContent = '发送验证码';
            } else {
              btnSendCode.textContent = seconds + 's 后重发';
            }
          }, 1000);
          showToast('验证码已发送至 ' + email + '（演示模式：输入 123456）', 'success');
          setTimeout(function() { codeInput.focus(); }, 200);
        });
      }

      if (emailForm) {
        emailForm.addEventListener('submit', function(e) {
          e.preventDefault();
          var email = emailInput.value.trim();
          var code = codeInput.value.trim();
          if (!email) { emailMsg.className = 'form-message error'; emailMsg.textContent = '请输入邮箱地址'; return; }
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { emailMsg.className = 'form-message error'; emailMsg.textContent = '邮箱格式不正确'; return; }
          if (!code) { emailMsg.className = 'form-message error'; emailMsg.textContent = '请输入验证码'; return; }
          if (code === '123456' || code.length === 6) {
            emailMsg.className = 'form-message success';
            emailMsg.textContent = '✅ 验证成功，正在进入应用...';
            saveAuth(email, 'email');
            setTimeout(function() { hideOverlay(); }, 800);
          } else {
            emailMsg.className = 'form-message error';
            emailMsg.textContent = '验证码错误，演示模式请输入 123456';
          }
        });
      }

      // ═════════════════════════════════════
      //  SOCIAL LOGIN (placeholder)
      // ═════════════════════════════════════
      var socialMsg = document.getElementById('social-message');
      document.querySelectorAll('.btn-social').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var name = this.querySelector('span:not(.social-badge)').textContent.trim();
          socialMsg.className = 'form-message error';
          socialMsg.textContent = '⚠️ ' + name + ' 功能正在开发中，请使用邮箱验证码登录';
          showToast(name + ' 即将上线，敬请期待', 'error');
        });
      });

      // ═════════════════════════════════════
      //  PASSWORD LOGIN
      // ═════════════════════════════════════
      var pwdForm = document.getElementById('form-password');
      var pwdMsg = document.getElementById('password-message');
      var pwdEmailInput = document.getElementById('pwd-email');
      var pwdInput = document.getElementById('pwd-input');

      if (pwdForm) {
        pwdForm.addEventListener('submit', function(e) {
          e.preventDefault();
          var username = pwdEmailInput.value.trim();
          var password = pwdInput.value.trim();
          if (!username) { pwdMsg.className = 'form-message error'; pwdMsg.textContent = '请输入邮箱或用户名'; return; }
          if (!password || password.length < 4) { pwdMsg.className = 'form-message error'; pwdMsg.textContent = '密码至少 4 位'; return; }
          pwdMsg.className = 'form-message success';
          pwdMsg.textContent = '✅ 登录成功，正在进入应用...';
          saveAuth(username, 'password');
          setTimeout(function() { hideOverlay(); }, 800);
        });
      }

      // ═════════════════════════════════════
      //  SKIP
      // ═════════════════════════════════════
      var skipBtn = document.getElementById('btn-skip');
      if (skipBtn) {
        skipBtn.addEventListener('click', function() {
          saveAuth('guest', 'skip');
          hideOverlay();
        });
      }
    })();
    </script>

    <script type="module" src="../src/renderer/web-main.tsx"></script>
  </body>
</html>
